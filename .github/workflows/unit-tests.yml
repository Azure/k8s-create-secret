name: 'Unit Tests'
on: # rebuild any PRs and main branch changes
   pull_request:
   push:
      branches:
         - main
         - 'releases/*'

jobs:
   build: # make sure build/ci works properly
      name: Run Unit Tests
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
         - name: npm install
           id: npm-install
           run: |
              npm install
         - name: Run npm build
           id: npm-build
           run: |
              npm run build
         - name: Run npm test
           id: npm-test
           run: |
              npm test
