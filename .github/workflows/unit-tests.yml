name: 'Unit Tests'
on: # rebuild any PRs and main branch changes
   pull_request:
   push:
      branches:
         - main
         - 'releases/*'

jobs:
   build: # make sure build/ci works properly
      name: Run Unit Tests
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
         - name: npm install
           id: npm-install
           run: |
              npm install
         - name: Run npm build
           id: npm-build
           run: |
              npm run build
         - name: Run npm test
           id: npm-test
           run: |
              npm test
