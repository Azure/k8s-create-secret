name: 'Unit Tests'
on: # rebuild any PRs and main branch changes
   pull_request:
   push:
      branches:
         - main
         - 'releases/*'

jobs:
   build: # make sure build/ci works properly
      name: Run Unit Tests
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
         - name: npm install
           id: npm-install
           run: |
              npm install
         - name: Run npm build
           id: npm-build
           run: |
              npm run build
         - name: Run npm test
           id: npm-test
           run: |
              npm test
